<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Antrian SPMB - Siswa</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; color: #333; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { margin-bottom: 5px; color: #2c3e50; text-align: center; }
        .subtitle { color: #64748b; font-size: 0.9rem; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        input:disabled, select:disabled { background-color: #f1f5f9; cursor: not-allowed; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; background-color: #3b82f6; color: white; transition: background 0.2s; }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .badge-jurusan { display: block; text-align: center; background-color: #e0f2fe; color: #0369a1; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; }
        .alert-error { background-color: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; text-align: center; }
        .sukses-box { text-align: center; display: none; }
        .nomor-antrian { font-size: 5rem; font-weight: 800; color: #10b981; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <div id="areaForm">
        <h2>Ambil Antrian SPMB</h2>
        <div class="subtitle" id="tglTeks">Daftar Ulang Online</div>
        <div id="statusHari Ini"></div>

        <form id="formSiswa">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" required placeholder="Masukkan nama lengkap">
            </div>
            <div class="form-group">
                <label for="nisn">NISN</label>
                <input type="text" id="nisn" required placeholder="10 Digit Angka NISN" pattern="[0-9]{10}">
            </div>
            <div class="form-group">
                <label for="jurusan">Jurusan</label>
                <select id="jurusan" required></select>
            </div>
            <button type="submit" id="btnDaftar">Ambil Nomor Antrian</button>
        </form>
    </div>

    <div id="areaSukses" class="sukses-box">
        <h2>Pendaftaran Berhasil!</h2>
        <p style="color: #64748b;">Nomor Antrian Anda:</p>
        <div class="nomor-antrian" id="noSiswa">0</div>
        <p style="font-weight: bold;" id="namaSiswa">-</p>
        <p style="color: #64748b; font-size: 0.85rem; margin-top: 15px;">Silahkan screenshot halaman ini dan tunggu dipanggil oleh operator.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Konfigurasi Database Firebase (Menggunakan akun publik sementara agar langsung pakai)
    const firebaseConfig = { databaseURL: "https://antrian-spmb-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const JADWAL = { 22: "Kecantikan & Spa", 23: "Busana", 24: "Kuliner", 25: "Perhotelan" };
    const hariIni = new Date();
    const tgl = hariIni.getDate();
    const bln = hariIni.getMonth() + 1;
    const tanggalKey = `${hariIni.getFullYear()}-${bln}-${tgl}`;

    document.getElementById('tglTeks').innerText = `Jadwal Tanggal: ${tgl}/${bln}/${hariIni.getFullYear()}`;

    // Validasi Tanggal Otomatis (Mengunci Form di luar tanggal 22-25 Juni)
    if (bln === 6 && JADWAL[tgl]) {
        document.getElementById('statusHari Ini').innerHTML = `<div class="badge-jurusan">Hari ini khusus: Jurusan ${JADWAL[tgl]}</div>`;
        const opsi = document.createElement('option');
        opsi.value = JADWAL[tgl]; opsi.text = JADWAL[tgl];
        document.getElementById('jurusan').appendChild(opsi);
    } else {
        document.getElementById('statusHari Ini').innerHTML = `<div class="alert-error">Pendaftaran Online Ditutup / Tidak ada Jadwal Hari Ini.</div>`;
        document.getElementById('nama').disabled = true;
        document.getElementById('nisn').disabled = true;
        document.getElementById('jurusan').disabled = true;
        document.getElementById('btnDaftar').disabled = true;
    }

    // Aksi Klik Daftar
    document.getElementById('formSiswa').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const nama = document.getElementById('nama').value;
        const nisn = document.getElementById('nisn').value;
        const jurusan = document.getElementById('jurusan').value;

        // Ambil urutan nomor terakhir di Firebase
        const dbRef = ref(db);
        const snapshot = await get(child(dbRef, `antrian/${tanggalKey}`));
        let nomorBaru = 1;

        if (snapshot.exists()) {
            const data = snapshot.val();
            const totalData = Object.keys(data).length;
            if (totalData >= 150) {
                alert("Maaf, Kuota antrian hari ini sudah penuh (Maks 150)!");
                return;
            }
            nomorBaru = totalData + 1;
        }

        // Simpan Data Ke Firebase
        const dataAntrianRef = ref(db, `antrian/${tanggalKey}/${nomorBaru}`);
        set(dataAntrianRef, { nomor: nomorBaru, nama, nisn, jurusan })
        .then(() => {
            document.getElementById('areaForm').style.display = 'none';
            document.getElementById('areaSukses').style.display = 'block';
            document.getElementById('noSiswa').innerText = nomorBaru;
            document.getElementById('namaSiswa').innerText = `${nama} (${jurusan})`;
        });
    });
</script>
</body>
</html>
